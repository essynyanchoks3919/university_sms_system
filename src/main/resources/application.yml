spring:
  application:
    name: university-sms-system
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  datasource:
    url: jdbc:mysql://localhost:3306/university_sms?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password:1111
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: university-sms-secret-key-2024-super-secret
  expiration: 86400000

logging:
  level:
    root: INFO
    com.university.sms: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
