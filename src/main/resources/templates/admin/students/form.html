<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main-layout}">
<head>
    <title th:text="${student != null ? 'Edit Student' : 'Add New Student'}">Student Form</title>
</head>
<body>
<div layout:fragment="content">
    <div class="max-w-4xl mx-auto space-y-6">
        <!-- Page Header -->
        <div class="flex items-center gap-4">
            <a href="/admin/students" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                <i data-lucide="arrow-left" class="w-6 h-6 text-gray-600"></i>
            </a>
            <div>
                <h1 class="text-3xl font-bold text-gray-900" th:text="${student != null ? 'Edit Student' : 'Add New Student'}">Student Form</h1>
                <p class="text-gray-500 text-sm mt-1">Enter student details below</p>
            </div>
        </div>
        
        <!-- Form -->
        <form th:action="${student != null ? '/api/students/' + student.studentId : '/api/students'}"
              method="post"
              th:method="${student != null ? 'put' : 'post'}"
              id="studentForm"
              class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
            
            <!-- CSRF Token -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            
            <!-- Personal Information Section -->
            <div class="mb-8">
                <h2 class="text-xl font-semibold text-gray-900 mb-6 pb-4 border-b border-gray-200">Personal Information</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- First Name -->
                    <div>
                        <label for="firstName" class="block text-sm font-medium text-gray-700 mb-2">
                            First Name <span class="text-red-500">*</span>
                        </label>
                        <input type="text"
                               id="firstName"
                               name="firstName"
                               th:value="${student?.firstName}"
                               placeholder="Enter first name"
                               required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-colors">
                        <p class="mt-1 text-sm text-red-600 hidden" id="firstNameError"></p>
                    </div>
                    
                    <!-- Last Name -->
                    <div>
                        <label for="lastName" class="block text-sm font-medium text-gray-700 mb-2">
                            Last Name <span class="text-red-500">*</span>
                        </label>
                        <input type="text"
                               id="lastName"
                               name="lastName"
                               th:value="${student?.lastName}"
                               placeholder="Enter last name"
                               required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-colors">
                        <p class="mt-1 text-sm text-red-600 hidden" id="lastNameError"></p>
                    </div>
                    
                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                            Email Address <span class="text-red-500">*</span>
                        </label>
                        <input type="email"
                               id="email"
                               name="email"
                               th:value="${student?.email}"
                               placeholder="student@university.edu"
                               required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-colors">
                        <p class="mt-1 text-sm text-red-600 hidden" id="emailError"></p>
                    </div>
                    
                    <!-- Phone Number -->
                    <div>
                        <label for="phoneNumber" class="block text-sm font-medium text-gray-700 mb-2">
                            Phone Number
                        </label>
                        <input type="tel"
                               id="phoneNumber"
                               name="phoneNumber"
                               th:value="${student?.phoneNumber}"
                               placeholder="+1 (555) 123-4567"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-colors">
                    </div>
                    
                    <!-- Date of Birth -->
                    <div>
                        <label for="dateOfBirth" class="block text-sm font-medium text-gray-700 mb-2">
                            Date of Birth
                        </label>
                        <input type="date"
                               id="dateOfBirth"
                               name="dateOfBirth"
                               th:value="${student?.dateOfBirth}"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-colors">
                    </div>
                    
                    <!-- Gender -->
                    <div>
                        <label for="gender" class="block text-sm font-medium text-gray-700 mb-2">
                            Gender
                        </label>
                        <select id="gender" name="gender" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-colors">
                            <option value="">Select Gender</option>
                            <option value="M" th:selected="${student?.gender == 'M'}">Male</option>
                            <option value="F" th:selected="${student?.gender == 'F'}">Female</option>
                            <option value="O" th:selected="${student?.gender == 'O'}">Other</option>
                        </select>
                    </div>
                </div>
                
                <!-- Address -->
                <div class="mt-6">
                    <label for="address" class="block text-sm font-medium text-gray-700 mb-2">
                        Address
                    </label>
                    <textarea id="address"
                              name="address"
                              placeholder="Enter full address"
                              rows="3"
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-colors" th:text="${student?.address}"></textarea>
                </div>
            </div>
            
            <!-- Academic Information Section -->
            <div class="mb-8">
                <h2 class="text-xl font-semibold text-gray-900 mb-6 pb-4 border-b border-gray-200">Academic Information</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Student ID -->
                    <div th:if="${student != null}">
                        <label for="studentId" class="block text-sm font-medium text-gray-700 mb-2">
                            Student ID (Auto-generated)
                        </label>
                        <input type="text"
                               id="studentId"
                               name="studentId"
                               th:value="${student?.studentId}"
                               disabled
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm bg-gray-50 text-gray-600">
                    </div>
                    
                    <!-- Department -->
                    <div>
                        <label for="department" class="block text-sm font-medium text-gray-700 mb-2">
                            Department <span class="text-red-500">*</span>
                        </label>
                        <select id="department" name="department" required class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-colors">
                            <option value="">Select Department</option>
                            <option value="engineering" th:selected="${student?.department == 'engineering'}">Engineering</option>
                            <option value="science" th:selected="${student?.department == 'science'}">Science</option>
                            <option value="arts" th:selected="${student?.department == 'arts'}">Arts</option>
                            <option value="commerce" th:selected="${student?.department == 'commerce'}">Commerce</option>
                            <option value="law" th:selected="${student?.department == 'law'}">Law</option>
                        </select>
                    </div>
                    
                    <!-- Enrollment Date -->
                    <div th:if="${student != null}">
                        <label for="enrollmentDate" class="block text-sm font-medium text-gray-700 mb-2">
                            Enrollment Date
                        </label>
                        <input type="date"
                               id="enrollmentDate"
                               name="enrollmentDate"
                               th:value="${student?.enrollmentDate}"
                               disabled
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm bg-gray-50 text-gray-600">
                    </div>
                    
                    <!-- Status -->
                    <div>
                        <label for="status" class="block text-sm font-medium text-gray-700 mb-2">
                            Status
                        </label>
                        <select id="status" name="status" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-colors">
                            <option value="ACTIVE" th:selected="${student?.status == 'ACTIVE'}">Active</option>
                            <option value="SUSPENDED" th:selected="${student?.status == 'SUSPENDED'}">Suspended</option>
                            <option value="GRADUATED" th:selected="${student?.status == 'GRADUATED'}">Graduated</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- Form Actions -->
            <div class="flex gap-4 pt-8 border-t border-gray-200">
                <a href="/admin/students" class="px-6 py-2 border border-gray-300 text-sm font-medium text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">
                    Cancel
                </a>
                <button type="reset" class="px-6 py-2 border border-gray-300 text-sm font-medium text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">
                    Reset
                </button>
                <button type="submit" class="px-6 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors ml-auto">
                    <i data-lucide="save" class="w-4 h-4 inline mr-2"></i>
                    <span th:text="${student != null ? 'Update Student' : 'Create Student'}">Create Student</span>
                </button>
            </div>
        </form>
    </div>
    
    <!-- Page Scripts -->
    <div th:fragment="page-scripts">
        <script>
            /**
             * Student Form Validation & Submission
             */
            document.getElementById('studentForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                if (!validateForm()) return;
                
                const formData = new FormData(this);
                const method = this.method.toLowerCase();
                const url = this.action;
                
                const request = method === 'put' 
                    ? axios.put(url, Object.fromEntries(formData))
                    : axios.post(url, Object.fromEntries(formData));
                
                request
                    .then(response => {
                        showSuccess('Success', method === 'put' ? 'Student updated successfully' : 'Student created successfully');
                        setTimeout(() => window.location.href = '/admin/students', 1500);
                    })
                    .catch(error => {
                        const message = error.response?.data?.message || 'Operation failed';
                        showError('Error', message);
                    });
            });
            
            /**
             * Validate Form Fields
             */
            function validateForm() {
                let isValid = true;
                
                // First Name
                const firstName = document.getElementById('firstName');
                if (!firstName.value.trim()) {
                    showFieldError('firstNameError', 'First name is required');
                    isValid = false;
                } else {
                    hideFieldError('firstNameError');
                }
                
                // Last Name
                const lastName = document.getElementById('lastName');
                if (!lastName.value.trim()) {
                    showFieldError('lastNameError', 'Last name is required');
                    isValid = false;
                } else {
                    hideFieldError('lastNameError');
                }
                
                // Email
                const email = document.getElementById('email');
                if (!isValidEmail(email.value)) {
                    showFieldError('emailError', 'Please enter a valid email address');
                    isValid = false;
                } else {
                    hideFieldError('emailError');
                }
                
                return isValid;
            }
            
            /**
             * Validate Email Format
             */
            function isValidEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }
            
            /**
             * Show Field Error
             */
            function showFieldError(elementId, message) {
                const errorEl = document.getElementById(elementId);
                if (errorEl) {
                    errorEl.textContent = message;
                    errorEl.classList.remove('hidden');
                }
            }
            
            /**
             * Hide Field Error
             */
            function hideFieldError(elementId) {
                const errorEl = document.getElementById(elementId);
                if (errorEl) {
                    errorEl.classList.add('hidden');
                }
            }
        </script>
    </div>
</div>
</body>
</html>
