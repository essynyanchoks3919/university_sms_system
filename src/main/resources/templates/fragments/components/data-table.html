<!-- 
  Data Table Component
  Usage: <div th:replace="~{fragments/components/data-table :: data-table(tableId='studentsTable')}"></div>
-->
<div th:fragment="data-table(tableId, columns)">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <!-- Table Toolbar -->
      <div class="p-6 border-b border-gray-100 flex items-center justify-between gap-4 flex-wrap">
          <div class="flex items-center gap-4 flex-1 min-w-0">
              <input type="search" 
                     class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                     placeholder="Search table..." 
                     onkeyup="filterTable(this)">
              <button class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors"
                      onclick="exportTableToCSV()">
                  <i data-lucide="download" class="w-4 h-4 inline mr-2"></i>Export
              </button>
          </div>
      </div>
      
      <!-- Table -->
      <div class="overflow-x-auto">
          <table th:id="${tableId}" class="w-full text-sm">
              <thead class="bg-gray-50 border-b border-gray-200">
                  <tr th:each="col : ${columns}">
                      <th class="px-6 py-4 text-left font-semibold text-gray-700" th:text="${col}">Column</th>
                  </tr>
              </thead>
              <tbody id="tableBody">
                  <!-- Rows populated by JavaScript -->
              </tbody>
          </table>
      </div>
      
      <!-- Pagination -->
      <div class="px-6 py-4 border-t border-gray-100 flex items-center justify-between">
          <p class="text-sm text-gray-600">
              Showing <span id="rowsShowing">0</span> to <span id="rowsTo">0</span> of <span id="rowsTotal">0</span> results
          </p>
          <div class="flex gap-2">
              <button class="px-3 py-2 border border-gray-300 rounded-lg text-sm hover:bg-gray-50 transition-colors disabled:opacity-50"
                      id="prevBtn" onclick="previousPage()">Previous</button>
              <button class="px-3 py-2 border border-gray-300 rounded-lg text-sm hover:bg-gray-50 transition-colors disabled:opacity-50"
                      id="nextBtn" onclick="nextPage()">Next</button>
          </div>
      </div>
  </div>
</div>
