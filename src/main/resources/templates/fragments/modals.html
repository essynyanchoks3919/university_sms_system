<div th:fragment="modals">
  <!-- Confirmation Modal -->
  <div id="confirmationModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg shadow-2xl max-w-md w-full mx-4">
          <div class="p-6">
              <div class="flex items-center justify-center w-12 h-12 mx-auto bg-yellow-100 rounded-full mb-4">
                  <i data-lucide="alert-circle" class="w-6 h-6 text-yellow-600"></i>
              </div>
              <h3 id="confirmationTitle" class="text-lg font-semibold text-gray-900 text-center mb-2">
                  Are you sure?
              </h3>
              <p id="confirmationMessage" class="text-sm text-gray-500 text-center mb-6">
                  This action cannot be undone.
              </p>
              <div class="flex gap-3">
                  <button onclick="closeConfirmationModal()" 
                          class="flex-1 px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">
                      Cancel
                  </button>
                  <button id="confirmationConfirmBtn" 
                          onclick="confirmAction()" 
                          class="flex-1 px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-lg hover:bg-red-700 transition-colors">
                      Confirm
                  </button>
              </div>
          </div>
      </div>
  </div>
  
  <!-- Error Modal -->
  <div id="errorModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg shadow-2xl max-w-md w-full mx-4">
          <div class="p-6">
              <div class="flex items-center justify-center w-12 h-12 mx-auto bg-red-100 rounded-full mb-4">
                  <i data-lucide="x-circle" class="w-6 h-6 text-red-600"></i>
              </div>
              <h3 id="errorTitle" class="text-lg font-semibold text-gray-900 text-center mb-2">
                  Error Occurred
              </h3>
              <p id="errorMessage" class="text-sm text-gray-500 text-center mb-6">
                  An unexpected error occurred. Please try again.
              </p>
              <button onclick="closeErrorModal()" 
                      class="w-full px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-lg hover:bg-red-700 transition-colors">
                  Close
              </button>
          </div>
      </div>
  </div>
  
  <!-- Success Modal -->
  <div id="successModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg shadow-2xl max-w-md w-full mx-4">
          <div class="p-6">
              <div class="flex items-center justify-center w-12 h-12 mx-auto bg-green-100 rounded-full mb-4">
                  <i data-lucide="check-circle" class="w-6 h-6 text-green-600"></i>
              </div>
              <h3 id="successTitle" class="text-lg font-semibold text-gray-900 text-center mb-2">
                  Success!
              </h3>
              <p id="successMessage" class="text-sm text-gray-500 text-center mb-6">
                  Operation completed successfully.
              </p>
              <button onclick="closeSuccessModal()" 
                      class="w-full px-4 py-2 text-sm font-medium text-white bg-green-600 rounded-lg hover:bg-green-700 transition-colors">
                  Close
              </button>
          </div>
      </div>
  </div>
</div>
