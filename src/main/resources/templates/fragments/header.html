<header th:fragment="header" class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-40">
  <div class="px-6 py-4 flex items-center justify-between">
      <!-- Left Section: Logo & Search -->
      <div class="flex items-center gap-8 flex-1">
          <!-- Logo -->
          <div class="flex items-center gap-3">
              <div class="p-2 bg-indigo-600 rounded-lg">
                  <i data-lucide="graduation-cap" class="w-6 h-6 text-white"></i>
              </div>
              <span class="text-xl font-bold text-gray-900">University SMS</span>
          </div>
          
          <!-- Search Bar -->
          <div class="hidden md:block flex-1 max-w-md">
              <div class="relative">
                  <input type="text" 
                         id="global-search"
                         placeholder="Search students, courses..." 
                         class="w-full px-4 py-2 pl-10 text-sm bg-slate-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                  <i data-lucide="search" class="absolute left-3 top-2.5 w-5 h-5 text-gray-400"></i>
              </div>
          </div>
      </div>
      
      <!-- Right Section: Actions -->
      <div class="flex items-center gap-4">
          <!-- Notifications -->
          <div class="relative group">
              <button class="p-2 hover:bg-slate-100 rounded-lg transition-colors relative">
                  <i data-lucide="bell" class="w-6 h-6 text-gray-700"></i>
                  <!-- Notification Badge -->
                  <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
              </button>
              
              <!-- Notification Dropdown -->
              <div class="absolute right-0 mt-2 w-80 bg-white rounded-lg shadow-xl border border-gray-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
                  <div class="p-4 border-b border-gray-100">
                      <h3 class="font-semibold text-gray-900">Notifications</h3>
                  </div>
                  <div class="max-h-96 overflow-y-auto">
                      <div class="p-4 text-center text-sm text-gray-500">
                          No new notifications
                      </div>
                  </div>
              </div>
          </div>
          
          <!-- User Profile Dropdown -->
          <div class="relative group">
              <button class="flex items-center gap-3 p-2 hover:bg-slate-100 rounded-lg transition-colors">
                  <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=admin" 
                       alt="User Avatar" 
                       class="w-8 h-8 rounded-full">
                  <span class="hidden sm:block text-sm font-medium text-gray-700">Admin User</span>
                  <i data-lucide="chevron-down" class="w-4 h-4 text-gray-500"></i>
              </button>
              
              <!-- Profile Dropdown -->
              <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl border border-gray-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
                  <div class="p-4 border-b border-gray-100">
                      <p class="text-sm font-medium text-gray-900">admin@university.edu</p>
                      <p class="text-xs text-gray-500">Administrator</p>
                  </div>
                  <nav class="p-2">
                      <a href="#" class="block px-3 py-2 text-sm text-gray-700 hover:bg-slate-100 rounded transition-colors">
                          <i data-lucide="user" class="w-4 h-4 inline mr-2"></i>Profile
                      </a>
                      <a href="#" class="block px-3 py-2 text-sm text-gray-700 hover:bg-slate-100 rounded transition-colors">
                          <i data-lucide="settings" class="w-4 h-4 inline mr-2"></i>Settings
                      </a>
                      <hr class="my-2">
                      <a href="/logout" class="block px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded transition-colors">
                          <i data-lucide="log-out" class="w-4 h-4 inline mr-2"></i>Logout
                      </a>
                  </nav>
              </div>
          </div>
      </div>
  </div>
</header>
